name: CI

on:
  push:
    branches: ["main", "dev"]
    tags:     ["v*"]
  pull_request:
    branches: ["main"]

# ── Shared setup for Tauri system dependencies ────────────────────────────────
env:
  RUST_BACKTRACE: 1

jobs:
  # ── Rust: fmt + clippy + test (Linux only — fastest) ─────────────────────────
  rust:
    name: Rust (lint + test)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: src-tauri

    steps:
      - uses: actions/checkout@v4

      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf libssl-dev build-essential

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --locked --all-features -- --test-threads=4

  # ── JS: build + test ──────────────────────────────────────────────────────────
  js:
    name: JS (build + test)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build
      - run: npm test

  # ── Locale key validation ─────────────────────────────────────────────────────
  locales:
    name: Locale key check
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Check all locale files match en.json
        run: node scripts/check-locales.js

  # ── Validate Flatpak manifest ─────────────────────────────────────────────────
  flatpak-lint:
    name: Flatpak manifest lint
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak-builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y flatpak flatpak-builder

      - name: Validate manifest JSON
        run: |
          python3 - <<'PYEOF'
          import json
          with open('com.frostfinder.desktop.json') as fh:
              m = json.load(fh)
          assert m['app-id'] == 'com.frostfinder.desktop', 'wrong app-id'
          assert m['command'] == 'frostfinder', 'wrong command'
          assert any('--filesystem=host' in a for a in m['finish-args']), 'missing --filesystem=host'
          print('Manifest OK:', m['app-id'], '-', len(m['modules']), 'module(s)')
          PYEOF

      - name: Validate AppStream metainfo
        run: |
          sudo apt-get install -y appstream
          appstreamcli validate --pedantic \
            packaging/com.frostfinder.desktop.metainfo.xml

  # ── Cross-platform Rust compile check ─────────────────────────────────────────
  # Checks that the Rust codebase compiles on all three target OSes.
  # Does NOT run tests (cross-compilation test execution is complex).
  rust-crosscheck:
    name: Rust compile (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [rust]   # only run if Linux lint+test passes

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14          # Apple Silicon runner — fastest macOS
            target: aarch64-apple-darwin
          - os: windows-2022
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ matrix.target }}-

      # macOS: install WebKit via brew
      - name: macOS system deps
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config
          # webkit2gtk not needed on macOS — Tauri uses WKWebView natively

      # Windows: MSVC toolchain is pre-installed on windows-2022 runner
      - name: Cargo check (compile only)
        working-directory: src-tauri
        run: cargo check --locked --target ${{ matrix.target }}

  # ── Release: matrix build + publish ──────────────────────────────────────────
  release:
    name: Release (${{ matrix.os }} / ${{ matrix.bundle }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [rust, js, locales, rust-crosscheck]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux bundles
          - os: ubuntu-22.04
            bundle: deb
            artifact: "*.deb"
          - os: ubuntu-22.04
            bundle: rpm
            artifact: "*.rpm"
          - os: ubuntu-22.04
            bundle: appimage
            artifact: "*.AppImage"
          # macOS bundles
          - os: macos-14
            bundle: dmg
            artifact: "*.dmg"
          - os: macos-14
            bundle: app
            artifact: "*.app"
          # Windows bundles
          - os: windows-2022
            bundle: msi
            artifact: "*.msi"
          - os: windows-2022
            bundle: nsis
            artifact: "*.exe"

    steps:
      - uses: actions/checkout@v4

      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf libssl-dev build-essential

      - name: macOS system deps
        if: runner.os == 'macOS'
        run: brew install pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ matrix.bundle }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-${{ matrix.bundle }}-

      - name: Install JS deps
        run: npm ci

      - name: Build ${{ matrix.bundle }}
        run: npm run tauri build -- --bundles ${{ matrix.bundle }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frostfinder-${{ runner.os }}-${{ matrix.bundle }}
          path: |
            src-tauri/target/release/bundle/**/${{ matrix.artifact }}
          if-no-files-found: error

  # ── Publish GitHub Release ────────────────────────────────────────────────────
  publish:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate release notes from RELEASE.md
        id: notes
        run: |
          awk '/^## What'\''s in/{count++; if(count==2) exit} {print}' RELEASE.md > release-notes.md
          echo "notes_file=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.notes_file }}
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: dist/**
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Notify AUR ────────────────────────────────────────────────────────────────
  aur-notify:
    name: Notify AUR maintainer
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Post AUR bump reminder as release comment
        run: |
          echo "::notice title=AUR bump required::New release ${{ steps.ver.outputs.version }} published."
          echo "::notice::Run: bash packaging/generate-srcinfo.sh then push to AUR."
          echo "::notice::PKGBUILD pkgver should be set to ${{ steps.ver.outputs.version }}"
