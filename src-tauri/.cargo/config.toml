# Increase rustc worker-thread stack size to 32 MiB.
# cairo-rs / gio use deeply recursive proc-macro expansion that overflows
# the default 8 MiB stack, causing rustc SIGSEGV on some machines.
# 16 MiB was insufficient on some setups; rustc itself recommends 32 MiB.
[env]
RUST_MIN_STACK = "67108864"
