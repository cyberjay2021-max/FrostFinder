<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b8dd9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a7bc7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d6ab5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frost" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)"/>
  
  <!-- Snowflake/Frost icon -->
  <g transform="translate(256, 256)" fill="url(#frost)">
    <!-- Center circle -->
    <circle cx="0" cy="0" r="32" fill="url(#frost)"/>
    
    <!-- 6 main arms -->
    <g transform="rotate(0)">
      <rect x="-12" y="-140" width="24" height="100" rx="12"/>
      <rect x="-8" y="-100" width="16" height="24" rx="4" transform="rotate(45, 0, -88)"/>
      <rect x="-8" y="-100" width="16" height="24" rx="4" transform="rotate(-45, 0, -88)"/>
    </g>
    <g transform="rotate(60)">
      <rect x="-12" y="-140" width="24" height="100" rx="12"/>
      <rect x="-8" y="-100" width="16" height="24" rx="4" transform="rotate(45, 0, -88)"/>
      <rect x="-8" y="-100" width="16" height="24" rx="4" transform="rotate(-45, 0, -88)"/>
    </g>
    <g transform="rotate(120)">
      <rect x="-12" y="-140" width="24" height="100" rx="12"/>
      <rect x="-8" y="-100" width="16" height="24" rx="4" transform="rotate(45, 0, -88)"/>
      <rect x="-8" y="-100" width="16" height="24" rx="4" transform="rotate(-45, 0, -88)"/>
    </g>
    <g transform="rotate(180)">
      <rect x="-12" y="-140" width="24" height="100" rx="12"/>
      <rect x="-8" y="-100" width="16" height="24" rx="4" transform="rotate(45, 0, -88)"/>
      <rect x="-8" y="-100" width="16" height="24" rx="4" transform="rotate(-45, 0, -88)"/>
    </g>
    <g transform="rotate(240)">
      <rect x="-12" y="-140" width="24" height="100" rx="12"/>
      <rect x="-8" y="-100" width="16" height="24" rx="4" transform="rotate(45, 0, -88)"/>
      <rect x="-8" y="-100" width="16" height="24" rx="4" transform="rotate(-45, 0, -88)"/>
    </g>
    <g transform="rotate(300)">
      <rect x="-12" y="-140" width="24" height="100" rx="12"/>
      <rect x="-8" y="-100" width="16" height="24" rx="4" transform="rotate(45, 0, -88)"/>
      <rect x="-8" y="-100" width="16" height="24" rx="4" transform="rotate(-45, 0, -88)"/>
    </g>
  </g>
</svg>