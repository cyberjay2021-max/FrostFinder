<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FrostFinder</title>
<!-- Inter loaded async — does not block JS startup -->
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"></noscript>
<link rel="stylesheet" href="/src/style.css">
</head>
<body>
<div class="window" id="window">
  <div class="titlebar">
    <div class="wm-btns">
      <div class="wm c" id="wm-close"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="3" y1="3" x2="9" y2="9"/><line x1="9" y1="3" x2="3" y2="9"/></svg></div>
      <div class="wm m" id="wm-min"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="6" x2="10" y2="6"/></svg></div>
      <div class="wm x" id="wm-max"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="2" width="8" height="8" rx="1"/></svg></div>
    </div>
    <div class="titlebar-title">FrostFinder <span style="font-size:10px;opacity:0.5;font-weight:400">Beta Build</span></div>
  </div>
  <div class="tab-bar" id="tab-bar"></div>
  <div class="window-body">
    <aside class="sidebar" id="sidebar"></aside>
    <!-- r103: job queue container — children rendered dynamically by _sbProgress -->
    <div id="sb-ops-progress" class="sb-ops-progress" style="display:none"></div>
    <div class="sb-resize-handle" id="sb-resize"></div>
    <div class="content">
      <div class="toolbar" id="toolbar"></div>
      <div class="trash-banner" id="trash-banner" style="display:none"></div>
      <div class="main-pane">
        <div class="split-wrap" id="split-wrap">
          <div class="view-host" id="view-host"></div>
          <div class="split-divider" id="split-divider" style="display:none"></div>
          <div class="view-host split-pane-b" id="pane-b" style="display:none"></div>
        </div>
        <div class="preview-panel" id="preview-panel">
          <div class="preview-empty">Select a file to preview</div>
        </div>
      </div>
      <div class="statusbar" id="status">Loading…</div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
